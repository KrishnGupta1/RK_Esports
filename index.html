<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>RK Esports</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              brand: {
                900: '#1a1a1a', // Dark Background
                800: '#2d2d2d', // Card Background
                500: '#ff4757', // Primary Red/Pink
                400: '#ff6b81', // Secondary
                accent: '#2ed573', // Success/Green
                gold: '#ffa502'  // Coins
              }
            },
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
              roboto: ['Roboto', 'sans-serif'],
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #1a1a1a;
        color: #ffffff;
        -webkit-tap-highlight-color: transparent;
      }
      /* Custom Scrollbar for desktop feeling on web */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #1a1a1a;
      }
      ::-webkit-scrollbar-thumb {
        background: #ff4757;
        border-radius: 3px;
      }
      .google-btn-shadow {
        box-shadow: 0 2px 4px 0 rgba(0,0,0,.25);
      }
      .google-btn-shadow:active {
        box-shadow: 0 1px 2px 0 rgba(0,0,0,.25);
      }
    </style>
