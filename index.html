<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RK_Esports</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Firebase CDN -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
</head>

<body class="bg-gray-900 text-white">

<!-- LOGIN SCREEN -->
<div id="loginScreen" class="h-screen flex flex-col justify-center items-center">
  <h1 class="text-3xl font-bold mb-6">RK_ESPORTS</h1>

  <button onclick="login()" 
    class="bg-white text-black px-6 py-3 rounded-lg flex items-center gap-2">
    <img src="https://www.svgrepo.com/show/475656/google-color.svg" width="20">
    Continue with Google
  </button>

  <div id="loader" class="mt-6 hidden">
    <div class="w-8 h-8 border-4 border-red-500 border-t-transparent rounded-full animate-spin"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-4">
  <h2 class="text-xl font-bold mb-2">Welcome</h2>
  <p id="username"></p>

  <div class="mt-4 bg-gray-800 p-4 rounded-lg">
    <p>Wallet Balance</p>
    <h1 class="text-2xl font-bold">₹ <span id="wallet">0</span></h1>
  </div>

  <button onclick="logout()" 
    class="mt-6 bg-red-500 px-4 py-2 rounded">
    Logout
  </button>
</div>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBH1JWQVCLfFY2BEzdCUgwALvf59S3HEEo",
  authDomain: "rk-esports1.firebaseapp.com",
  databaseURL: "https://rk-esports1-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "rk-esports1",
  storageBucket: "rk-esports1.firebasestorage.app",
  messagingSenderId: "640016800272",
  appId: "1:640016800272:web:c2b86d7b11b1e6b8f04895"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();
const rtdb = firebase.database();

// LOGIN
function login() {
  document.getElementById("loader").classList.remove("hidden");

  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider).then(res => {
    const user = res.user;

    // Firestore save
    db.collection("users").doc(user.uid).set({
      uid: user.uid,
      name: user.displayName,
      email: user.email,
      wallet: 0,
      role: "user",
      createdAt: new Date()
    }, { merge: true });

  }).catch(err => {
    alert("Login Error");
    console.log(err);
  });
}

// AUTH STATE
auth.onAuthStateChanged(user => {
  document.getElementById("loader").classList.add("hidden");

  if (user) {
    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("dashboard").classList.remove("hidden");

    document.getElementById("username").innerText = user.displayName;

    // fetch wallet
    db.collection("users").doc(user.uid).get().then(doc => {
      if (doc.exists) {
        document.getElementById("wallet").innerText = doc.data().wallet;
      }
    });

  } else {
    document.getElementById("loginScreen").classList.remove("hidden");
    document.getElementById("dashboard").classList.add("hidden");
  }
});

// LOGOUT
function logout() {
  auth.signOut();
}
</script>

</body>
</html>
